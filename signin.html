<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign in — Nova</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:#060612;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:1.5rem;
  position:relative;overflow:hidden;
}

/* Background glow blobs */
.bg-blob{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;}
.blob1{width:500px;height:500px;background:rgba(123,94,167,.18);top:-120px;right:-100px;}
.blob2{width:350px;height:350px;background:rgba(99,102,241,.12);bottom:-80px;left:-80px;}

/* Card */
.card{
  position:relative;z-index:1;
  background:rgba(13,13,34,.85);
  border:1px solid rgba(196,181,253,.12);
  border-radius:20px;
  padding:2.5rem 2.2rem;
  width:100%;max-width:420px;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  box-shadow:0 32px 80px rgba(0,0,0,.5),0 0 0 1px rgba(196,181,253,.05);
}

/* Close button */
.close-btn{
  position:absolute;top:1.2rem;right:1.2rem;
  width:32px;height:32px;border-radius:50%;
  border:1px solid rgba(196,181,253,.15);background:rgba(196,181,253,.06);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:rgba(176,180,210,.6);
  font-size:1rem;line-height:1;
  text-decoration:none;
  transition:background .2s,color .2s,border-color .2s;
}
.close-btn:hover{background:rgba(196,181,253,.12);color:#fff;border-color:rgba(196,181,253,.3);}

/* Logo */
.logo{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-bottom:1.8rem;}
.logo-mark{
  width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,#7B5EA7,#a78bfa);
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:.85rem;font-weight:700;color:#fff;
  box-shadow:0 4px 16px rgba(123,94,167,.4);
}
.logo-text{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:#F0EEFF;}

/* Headings */
.card-title{
  font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;
  color:#F0EEFF;text-align:center;margin-bottom:.4rem;
}
.card-sub{font-size:.85rem;color:#8B8FA8;text-align:center;margin-bottom:1.8rem;font-weight:400;}

/* Google button */
.btn-google{
  width:100%;display:flex;align-items:center;justify-content:center;gap:.75rem;
  padding:.8rem 1.2rem;border-radius:10px;
  border:1px solid rgba(196,181,253,.15);
  background:rgba(255,255,255,.04);
  color:#b8bcce;font-size:.9rem;font-weight:500;
  cursor:pointer;transition:background .2s,border-color .2s,color .2s;
  font-family:'DM Sans',sans-serif;
}
.btn-google:hover{background:rgba(255,255,255,.08);border-color:rgba(196,181,253,.3);color:#F0EEFF;}
.btn-google svg{flex-shrink:0;}

/* Divider */
.divider{display:flex;align-items:center;gap:.9rem;margin:1.4rem 0;}
.divider-line{flex:1;height:1px;background:rgba(196,181,253,.1);}
.divider-text{font-size:.75rem;color:#8B8FA8;white-space:nowrap;font-weight:400;}

/* Form */
.form-group{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem;}
.form-group label{font-size:.78rem;font-weight:500;color:#b8bcce;letter-spacing:.02em;}
.form-group input{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(196,181,253,.12);
  border-radius:9px;padding:.78rem 1rem;
  color:#F0EEFF;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:400;
  outline:none;transition:border-color .2s,background .2s,box-shadow .2s;
  width:100%;
}
.form-group input::placeholder{color:rgba(139,143,168,.5);}
.form-group input:focus{
  border-color:rgba(167,139,250,.5);
  background:rgba(123,94,167,.08);
  box-shadow:0 0 0 3px rgba(123,94,167,.12);
}
.form-group input.error{border-color:rgba(248,113,113,.5);}

/* Password row */
.pw-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem;}
.pw-row label{font-size:.78rem;font-weight:500;color:#b8bcce;}
.forgot-link{font-size:.75rem;color:#a78bfa;transition:color .2s;}
.forgot-link:hover{color:#c4b5fd;}

/* Password wrapper */
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:2.8rem;}
.pw-toggle{
  position:absolute;right:.85rem;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:#8B8FA8;padding:0;display:flex;align-items:center;
  transition:color .2s;
}
.pw-toggle:hover{color:#b8bcce;}

/* Error message */
.error-msg{
  font-size:.75rem;color:#f87171;margin-top:.3rem;display:none;
}

/* Submit */
.btn-submit{
  width:100%;padding:.85rem;border-radius:10px;border:none;
  background:linear-gradient(135deg,#7B5EA7,#a78bfa);
  color:#fff;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;
  cursor:pointer;margin-top:.5rem;
  transition:filter .2s,transform .2s,box-shadow .2s;
  box-shadow:0 6px 24px rgba(123,94,167,.35);
  display:flex;align-items:center;justify-content:center;gap:.5rem;
}
.btn-submit:hover{filter:brightness(1.08);transform:translateY(-2px);box-shadow:0 10px 32px rgba(123,94,167,.45);}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.btn-submit .spinner{
  width:16px;height:16px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin .7s linear infinite;display:none;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Footer text */
.card-footer{text-align:center;margin-top:1.4rem;font-size:.82rem;color:#8B8FA8;}
.card-footer a{color:#a78bfa;transition:color .2s;}
.card-footer a:hover{color:#c4b5fd;}

/* Toast */
.toast{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);
  background:rgba(26,26,58,.95);border:1px solid rgba(196,181,253,.2);
  border-radius:10px;padding:.75rem 1.5rem;
  font-size:.85rem;color:#F0EEFF;
  display:flex;align-items:center;gap:.6rem;
  box-shadow:0 16px 48px rgba(0,0,0,.4);
  transition:transform .4s cubic-bezier(.16,1,.3,1);
  z-index:999;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast-icon{font-size:1rem;}

/* Responsive */
@media(max-width:480px){.card{padding:2rem 1.4rem;}}
</style>
</head>
<body>

<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>

<div class="card">
  <!-- Close -->
  <a href="nova.html" class="close-btn" title="Back to Nova">✕</a>

  <!-- Logo -->
  <div class="logo">
    <div class="logo-mark">N</div>
    <span class="logo-text">Nova</span>
  </div>

  <h1 class="card-title">Sign in to Nova</h1>
  <p class="card-sub">Welcome back — let's pick up where you left off.</p>

  <!-- Google sign-in -->
  <button class="btn-google" id="googleBtn" type="button">
    <svg width="18" height="18" viewBox="0 0 24 24">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-text">or sign in with email</span>
    <div class="divider-line"></div>
  </div>

  <!-- Sign-in form -->
  <form id="signinForm" novalidate>
    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email"/>
      <span class="error-msg" id="email-err">Please enter a valid email address.</span>
    </div>

    <div class="form-group">
      <div class="pw-row">
        <label for="password">Password</label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>
      <div class="pw-wrap">
        <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password"/>
        <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password">
          <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <span class="error-msg" id="pw-err">Password must be at least 6 characters.</span>
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">
      <div class="spinner" id="spinner"></div>
      <span id="submitText">Sign in</span>
    </button>
  </form>

  <div class="card-footer">
    Don't have an account? <a href="create-account.html">Create account</a>
  </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast">
  <span class="toast-icon">✓</span>
  <span id="toastMsg">Signed in successfully! Redirecting…</span>
</div>

<script>
// ── Password toggle ──
document.getElementById('pwToggle').addEventListener('click', function(){
  const input = document.getElementById('password');
  const isText = input.type === 'text';
  input.type = isText ? 'password' : 'text';
  document.getElementById('eyeIcon').innerHTML = isText
    ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
    : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
});

// ── Google sign-in simulation ──
document.getElementById('googleBtn').addEventListener('click', function(){
  this.textContent = 'Connecting to Google…';
  this.disabled = true;
  // Simulate OAuth redirect — in production replace with real Google OAuth
  setTimeout(()=>{
    saveSession({ name:'Google User', email:'user@gmail.com', avatar:'G', provider:'google' });
    showToast('✓ Signed in with Google! Redirecting…');
    setTimeout(()=>{ window.location.href='nova.html'; }, 1500);
  }, 1800);
});

// ── Form submit ──
document.getElementById('signinForm').addEventListener('submit', function(e){
  e.preventDefault();
  let valid = true;

  const email    = document.getElementById('email');
  const password = document.getElementById('password');
  const emailErr = document.getElementById('email-err');
  const pwErr    = document.getElementById('pw-err');

  // Reset
  email.classList.remove('error');
  password.classList.remove('error');
  emailErr.style.display = 'none';
  pwErr.style.display    = 'none';

  // Validate email
  if(!email.value || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)){
    email.classList.add('error');
    emailErr.style.display = 'block';
    valid = false;
  }

  // Validate password
  if(!password.value || password.value.length < 6){
    password.classList.add('error');
    pwErr.style.display = 'block';
    valid = false;
  }

  if(!valid) return;

  // Loading state
  const btn    = document.getElementById('submitBtn');
  const spinner= document.getElementById('spinner');
  const txt    = document.getElementById('submitText');
  btn.disabled = true;
  spinner.style.display = 'block';
  txt.textContent = 'Signing in…';

  setTimeout(()=>{
    // Save session to localStorage
    const name = email.value.split('@')[0];
    const initials = name.slice(0,1).toUpperCase();
    saveSession({
      name: name.charAt(0).toUpperCase() + name.slice(1),
      email: email.value,
      avatar: initials,
      provider: 'email'
    });
    showToast('✓ Signed in! Redirecting to your dashboard…');
    setTimeout(()=>{ window.location.href='nova.html'; }, 1500);
  }, 1600);
});

function saveSession(user){
  localStorage.setItem('nova_user', JSON.stringify(user));
}

function showToast(msg){
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
}
</script>
</body>
</html>
